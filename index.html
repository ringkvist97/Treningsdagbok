<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treningsdagbok</title>
  <style>
    :root {
      --bg: #0b0f13;
      --bg-elev: #141a22;
      --bg-elev-2: #1b2430;
      --border: #243042;
      --text: #e6edf3;
      --text-dim: #8b96a5;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --danger: #ff4d6d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    body {
      background:
        radial-gradient(1000px 500px at 10% -10%, rgba(0, 255, 136, 0.08), transparent 60%),
        radial-gradient(800px 400px at 110% 10%, rgba(0, 204, 255, 0.06), transparent 60%),
        var(--bg);
    }

    header {
      padding: 32px 24px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header h1 .accent {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
    }

    header p {
      color: var(--text-dim);
      margin: 8px 0 0;
      font-size: 0.95rem;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 80px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .session-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.15);
    }

    textarea { resize: vertical; min-height: 60px; }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #001912;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 6px 20px rgba(0, 255, 136, 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-elev-2);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 136, 0.08);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 77, 109, 0.3);
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: rgba(255, 77, 109, 0.1);
    }

    .exercises-section {
      border-top: 1px dashed var(--border);
      padding-top: 16px;
      margin-top: 4px;
    }

    .exercises-section-title {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .exercise-row {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .exercise-row-main {
      display: grid;
      gap: 2px;
    }

    .exercise-row-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .exercise-row-meta {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .exercise-form {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .exercise-form-row {
      display: grid;
      gap: 8px;
      align-items: end;
    }

    .exercise-form-row.top {
      grid-template-columns: 2fr 1fr 1fr;
    }

    .exercise-form-row.metrics {
      grid-template-columns: 1fr 1fr 1fr auto;
    }

    .exercise-form label {
      margin-bottom: 4px;
    }

    .exercise-form .btn-secondary {
      height: 42px;
    }

    [data-field-group].hidden {
      display: none !important;
    }

    .chip.chip-cardio {
      background: rgba(0, 204, 255, 0.08);
      color: #66d9ff;
    }

    .chip.chip-type {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
    }

    .chip.chip-cat {
      background: rgba(0, 255, 136, 0.08);
      color: var(--accent);
    }

    .chip.chip-sub {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
    }

    /* Progresjon */
    .chart-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .chart-controls select {
      width: auto;
      min-width: 140px;
    }

    .chart-block {
      margin-bottom: 24px;
    }

    .chart-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin: 0 0 8px;
    }

    .chart-wrap {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    .chart-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 10px;
    }

    .chart-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chart-legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .chart-empty {
      text-align: center;
      color: var(--text-dim);
      padding: 30px 10px;
      font-size: 0.9rem;
    }

    svg.bar-chart .bar:hover {
      filter: brightness(1.15);
    }

    svg.bar-chart text.axis-label {
      fill: var(--text-dim);
      font-size: 10px;
      font-family: inherit;
    }

    svg.bar-chart line.grid {
      stroke: var(--border);
      stroke-dasharray: 2 3;
    }

    .empty-exercises {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      padding: 16px;
      font-style: italic;
    }

    .submit-row {
      margin-top: 16px;
    }

    .submit-row button {
      width: 100%;
    }

    .history-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search {
      flex: 1;
      min-width: 180px;
    }

    .stats {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .stats strong {
      color: var(--accent);
      font-size: 1rem;
    }

    .day-group {
      margin-bottom: 20px;
    }

    .day-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .day-header h3 {
      margin: 0;
      font-size: 1rem;
      color: var(--accent);
      text-transform: capitalize;
    }

    .day-header span {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .session-card {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .session-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .session-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .session-card-title .time {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .session-exercises {
      display: grid;
      gap: 6px;
    }

    .session-exercise {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .session-exercise-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .session-exercise-meta {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .chip {
      display: inline-block;
      background: rgba(0, 255, 136, 0.08);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 999px;
      margin-right: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .session-notes {
      color: var(--text-dim);
      font-size: 0.85rem;
      font-style: italic;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 30px 10px;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .exercise-form-row.top {
        grid-template-columns: 1fr 1fr;
      }
      .exercise-form-row.top .field-exercise {
        grid-column: 1 / -1;
      }
      .exercise-form-row.metrics {
        grid-template-columns: 1fr 1fr;
      }
      .exercise-form-row.metrics .btn-secondary {
        grid-column: 1 / -1;
        width: 100%;
      }
    }

    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trenings<span class="accent">dagbok</span></h1>
    <p>Logg hver økt. Se fremgangen.</p>
  </header>

  <main>
    <section class="card">
      <h2>Ny økt</h2>

      <div class="session-meta">
        <div>
          <label for="datetime">Dato og tidspunkt</label>
          <input type="datetime-local" id="datetime" required />
        </div>
        <div>
          <label for="session-notes">Notat for hele økten (valgfritt)</label>
          <textarea id="session-notes" placeholder="Hvordan føltes økten? Energi, søvn, form..."></textarea>
        </div>
      </div>

      <div class="exercises-section">
        <div class="exercises-section-title">Øvelser i denne økten</div>
        <div id="draft-exercises"></div>

        <div class="exercise-form">
          <div class="exercise-form-row top">
            <div class="field-exercise">
              <label for="exercise">Øvelse</label>
              <input type="text" id="exercise" placeholder="f.eks. Markløft" />
            </div>
            <div>
              <label for="category">Muskelgruppe</label>
              <select id="category"></select>
            </div>
            <div>
              <label for="subcategory">Underkategori</label>
              <select id="subcategory"></select>
            </div>
          </div>

          <div class="exercise-form-row metrics">
            <div data-field-group="styrke">
              <label for="sets">Sett</label>
              <input type="number" id="sets" min="1" step="1" placeholder="3" />
            </div>
            <div data-field-group="styrke">
              <label for="reps">Reps</label>
              <input type="number" id="reps" min="1" step="1" placeholder="8" />
            </div>
            <div data-field-group="styrke">
              <label for="weight">Vekt (kg)</label>
              <input type="number" id="weight" min="0" step="0.5" placeholder="80" />
            </div>

            <div data-field-group="cardio" class="hidden">
              <label for="minutes">Minutter</label>
              <input type="number" id="minutes" min="0" step="1" placeholder="30" />
            </div>
            <div data-field-group="cardio" class="hidden">
              <label for="distance">Distanse (km)</label>
              <input type="number" id="distance" min="0" step="0.1" placeholder="5" />
            </div>
            <div data-field-group="cardio" class="hidden">
              <label for="resistance">Motstand</label>
              <input type="text" id="resistance" placeholder="f.eks. nivå 5" />
            </div>

            <button type="button" id="add-exercise-btn" class="btn-secondary">+ Legg til</button>
          </div>
        </div>

        <div class="submit-row">
          <button type="button" id="save-session-btn" class="btn-primary">Lagre økt</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Progresjon</h2>
      <div class="chart-controls">
        <div>
          <label for="chart-range">Tidsperiode</label>
          <select id="chart-range">
            <option value="8">Siste 8 uker</option>
            <option value="12" selected>Siste 12 uker</option>
            <option value="26">Siste 26 uker</option>
            <option value="52">Siste 52 uker</option>
          </select>
        </div>
      </div>
      <div id="progress-charts"></div>
    </section>

    <section class="card">
      <h2>Historikk</h2>
      <div class="history-controls">
        <input type="search" id="search" class="search" placeholder="Søk i øvelser eller notater..." />
        <div class="stats" id="stats">0 økter lagret</div>
        <button type="button" id="export-btn" class="btn-ghost">Eksporter</button>
      </div>
      <div id="history"></div>
    </section>
  </main>

  <footer>Data lagres lokalt i nettleseren din.</footer>

  <script>
    const STORAGE_KEY = 'treningsdagbok.sessions.v2';
    const OLD_STORAGE_KEY = 'treningsdagbok.entries.v1';

    const CATEGORIES = {
      'Bryst':  ['Upper Chest', 'Neutral', 'Lower Chest'],
      'Armer':  ['Biceps', 'Triceps'],
      'Rygg':   ['Upper Back', 'Lats', 'Lower Back'],
      'Mage':   ['Crunch', 'Static'],
      'Cardio': ['Gåing', 'Løping', 'Roing', 'Staking']
    };

    const CATEGORY_COLORS = {
      'Bryst':  '#00ff88',
      'Armer':  '#ffcc33',
      'Rygg':   '#66d9ff',
      'Mage':   '#ff9966',
      'Cardio': '#c77dff'
    };

    const CARDIO_COLORS = {
      'Gåing':   '#66d9ff',
      'Løping':  '#ff9966',
      'Roing':   '#c77dff',
      'Staking': '#ffcc33'
    };

    const dtInput = document.getElementById('datetime');
    const sessionNotesEl = document.getElementById('session-notes');
    const exerciseEl = document.getElementById('exercise');
    const categoryEl = document.getElementById('category');
    const subcategoryEl = document.getElementById('subcategory');
    const setsEl = document.getElementById('sets');
    const repsEl = document.getElementById('reps');
    const weightEl = document.getElementById('weight');
    const minutesEl = document.getElementById('minutes');
    const distanceEl = document.getElementById('distance');
    const resistanceEl = document.getElementById('resistance');
    const addExerciseBtn = document.getElementById('add-exercise-btn');
    const saveSessionBtn = document.getElementById('save-session-btn');
    const draftEl = document.getElementById('draft-exercises');
    const historyEl = document.getElementById('history');
    const statsEl = document.getElementById('stats');
    const searchEl = document.getElementById('search');
    const exportBtn = document.getElementById('export-btn');
    const fieldGroups = document.querySelectorAll('[data-field-group]');
    const chartRangeEl = document.getElementById('chart-range');
    const progressChartsEl = document.getElementById('progress-charts');

    // Øvelser som ligger i den pågående (ulagrede) økten
    let draftExercises = [];

    function currentCategory() {
      return categoryEl.value;
    }
    function currentType() {
      return currentCategory() === 'Cardio' ? 'cardio' : 'styrke';
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function setNow() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      dtInput.value = d.toISOString().slice(0, 16);
    }
    setNow();

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const sessions = JSON.parse(raw);
          // Sørg for at alle øvelser har type + kategori (bakoverkompatibilitet)
          let dirty = false;
          for (const s of sessions) {
            for (const ex of (s.exercises || [])) {
              if (!ex.type) { ex.type = 'styrke'; dirty = true; }
              if (ex.category === undefined) { ex.category = null; dirty = true; }
              if (ex.subcategory === undefined) { ex.subcategory = null; dirty = true; }
            }
          }
          if (dirty) save(sessions);
          return sessions;
        }

        // Migrering: gamle data der hver øvelse var sin egen "økt"
        const oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
        if (oldRaw) {
          const oldEntries = JSON.parse(oldRaw);
          const migrated = oldEntries.map(e => ({
            id: e.id || uid(),
            datetime: e.datetime,
            notes: e.notes || '',
            exercises: [{
              id: uid(),
              type: 'styrke',
              category: null,
              subcategory: null,
              exercise: e.exercise,
              sets: e.sets,
              reps: e.reps,
              weight: e.weight ?? null
            }]
          }));
          save(migrated);
          return migrated;
        }
        return [];
      } catch (e) {
        console.error('Kunne ikke lese lagrede data', e);
        return [];
      }
    }

    function save(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function formatDateKey(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('no-NO', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function exerciseChips(ex) {
      const chips = [];
      if (ex.category) chips.push(`<span class="chip chip-cat">${escapeHtml(ex.category)}</span>`);
      if (ex.subcategory) chips.push(`<span class="chip chip-sub">${escapeHtml(ex.subcategory)}</span>`);
      if (ex.type === 'cardio') {
        if (ex.minutes) chips.push(`<span class="chip chip-cardio">${ex.minutes} min</span>`);
        if (ex.distance != null && ex.distance !== '') chips.push(`<span class="chip chip-cardio">${ex.distance} km</span>`);
        if (ex.resistance) chips.push(`<span class="chip chip-cardio">${escapeHtml(ex.resistance)}</span>`);
      } else {
        const weightText = ex.weight ? `${ex.weight} kg` : 'kroppsvekt';
        chips.push(`<span class="chip">${ex.sets} × ${ex.reps}</span>`);
        chips.push(`<span class="chip">${escapeHtml(weightText)}</span>`);
      }
      return chips.join('');
    }

    function renderDraft() {
      if (draftExercises.length === 0) {
        draftEl.innerHTML = `<div class="empty-exercises">Ingen øvelser lagt til ennå. Fyll inn feltene under og trykk "Legg til".</div>`;
        return;
      }
      draftEl.innerHTML = draftExercises.map(ex => `
          <div class="exercise-row">
            <div class="exercise-row-main">
              <div class="exercise-row-title">${escapeHtml(ex.exercise)}</div>
              <div class="exercise-row-meta">${exerciseChips(ex)}</div>
            </div>
            <button type="button" class="btn-danger" data-draft-id="${ex.id}">Fjern</button>
          </div>`).join('');

      draftEl.querySelectorAll('button[data-draft-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          draftExercises = draftExercises.filter(ex => ex.id !== btn.dataset.draftId);
          renderDraft();
        });
      });
    }

    function populateCategorySelect() {
      categoryEl.innerHTML = Object.keys(CATEGORIES)
        .map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function populateSubcategorySelect(category) {
      const subs = CATEGORIES[category] || [];
      subcategoryEl.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function syncFieldGroups() {
      const type = currentType();
      fieldGroups.forEach(el => el.classList.toggle('hidden', el.dataset.fieldGroup !== type));
    }

    function onCategoryChange() {
      populateSubcategorySelect(currentCategory());
      syncFieldGroups();
    }

    function addExerciseToDraft() {
      const exercise = exerciseEl.value.trim();
      if (!exercise) {
        exerciseEl.focus();
        return;
      }

      const category = currentCategory();
      const subcategory = subcategoryEl.value || null;

      if (currentType() === 'cardio') {
        const minutes = parseFloat(minutesEl.value);
        const distanceRaw = distanceEl.value;
        const resistance = resistanceEl.value.trim();

        if (!minutes || minutes <= 0) {
          minutesEl.focus();
          return;
        }

        draftExercises.push({
          id: uid(),
          type: 'cardio',
          category,
          subcategory,
          exercise,
          minutes,
          distance: distanceRaw ? parseFloat(distanceRaw) : null,
          resistance: resistance || null
        });

        minutesEl.value = '';
        distanceEl.value = '';
        resistanceEl.value = '';
      } else {
        const sets = parseInt(setsEl.value, 10);
        const reps = parseInt(repsEl.value, 10);
        const weightRaw = weightEl.value;

        if (!sets || sets < 1) {
          setsEl.focus();
          return;
        }
        if (!reps || reps < 1) {
          repsEl.focus();
          return;
        }

        draftExercises.push({
          id: uid(),
          type: 'styrke',
          category,
          subcategory,
          exercise,
          sets,
          reps,
          weight: weightRaw ? parseFloat(weightRaw) : null
        });

        setsEl.value = '';
        repsEl.value = '';
        weightEl.value = '';
      }

      exerciseEl.value = '';
      exerciseEl.focus();
      renderDraft();
    }

    function saveSession() {
      if (draftExercises.length === 0) {
        alert('Legg til minst én øvelse før du lagrer økten.');
        return;
      }
      if (!dtInput.value) {
        alert('Velg dato og tidspunkt.');
        return;
      }

      const session = {
        id: uid(),
        datetime: new Date(dtInput.value).toISOString(),
        notes: sessionNotesEl.value.trim(),
        exercises: draftExercises.map(ex => ({ ...ex }))
      };

      const sessions = load();
      sessions.push(session);
      save(sessions);

      // Nullstill skjemaet
      draftExercises = [];
      sessionNotesEl.value = '';
      exerciseEl.value = '';
      setsEl.value = '';
      repsEl.value = '';
      weightEl.value = '';
      minutesEl.value = '';
      distanceEl.value = '';
      resistanceEl.value = '';
      setNow();

      renderDraft();
      render();
    }

    function deleteSession(id) {
      if (!confirm('Slette hele denne økten?')) return;
      const sessions = load().filter(s => s.id !== id);
      save(sessions);
      render();
    }

    function sessionMatchesQuery(session, query) {
      if (!query) return true;
      if ((session.notes || '').toLowerCase().includes(query)) return true;
      return session.exercises.some(ex =>
        (ex.exercise || '').toLowerCase().includes(query) ||
        (ex.category || '').toLowerCase().includes(query) ||
        (ex.subcategory || '').toLowerCase().includes(query)
      );
    }

    function render() {
      const all = load();
      const query = searchEl.value.trim().toLowerCase();
      const filtered = all.filter(s => sessionMatchesQuery(s, query));

      statsEl.innerHTML = `<strong>${all.length}</strong> økt${all.length === 1 ? '' : 'er'} lagret`;

      if (filtered.length === 0) {
        historyEl.innerHTML = `<div class="empty">${
          all.length === 0
            ? 'Ingen økter ennå. Legg til din første over.'
            : 'Ingen treff på søket ditt.'
        }</div>`;
        return;
      }

      const sorted = [...filtered].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

      // Grupper etter dato
      const groups = new Map();
      for (const s of sorted) {
        const key = formatDateKey(s.datetime);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(s);
      }

      let html = '';
      for (const [day, sessions] of groups) {
        const totalExercises = sessions.reduce((sum, s) => sum + s.exercises.length, 0);
        html += `<div class="day-group">
          <div class="day-header">
            <h3>${escapeHtml(day)}</h3>
            <span>${sessions.length} økt${sessions.length === 1 ? '' : 'er'} · ${totalExercises} øvelse${totalExercises === 1 ? '' : 'r'}</span>
          </div>`;

        for (const s of sessions) {
          html += `
            <div class="session-card">
              <div class="session-card-header">
                <div class="session-card-title">
                  <span class="time">${formatTime(s.datetime)}</span>
                  <span>· ${s.exercises.length} øvelse${s.exercises.length === 1 ? '' : 'r'}</span>
                </div>
                <button type="button" class="btn-danger" data-session-id="${s.id}">Slett økt</button>
              </div>
              <div class="session-exercises">`;

          for (const ex of s.exercises) {
            html += `
                <div class="session-exercise">
                  <div>
                    <div class="session-exercise-name">${escapeHtml(ex.exercise)}</div>
                    <div class="session-exercise-meta">${exerciseChips(ex)}</div>
                  </div>
                </div>`;
          }

          html += `</div>`;

          if (s.notes) {
            html += `<div class="session-notes">${escapeHtml(s.notes)}</div>`;
          }

          html += `</div>`;
        }
        html += `</div>`;
      }
      historyEl.innerHTML = html;

      historyEl.querySelectorAll('button[data-session-id]').forEach(btn => {
        btn.addEventListener('click', () => deleteSession(btn.dataset.sessionId));
      });

      renderProgress();
    }

    // --- PROGRESJONSGRAFER -----------------------------------------------

    // ISO-uke: returner "YYYY-Www" og starten på uken (mandag)
    function isoWeek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const day = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
      return { key: `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`, label: `U${weekNo}` };
    }

    function mondayOf(date) {
      const d = new Date(date);
      const day = (d.getDay() + 6) % 7; // 0 = mandag
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - day);
      return d;
    }

    function buildWeekBuckets(weeksBack) {
      const now = mondayOf(new Date());
      const buckets = [];
      for (let i = weeksBack - 1; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i * 7);
        const { key, label } = isoWeek(d);
        buckets.push({ key, label, date: d });
      }
      return buckets;
    }

    function aggregate(sessions, weeksBack) {
      const buckets = buildWeekBuckets(weeksBack);
      const idx = new Map(buckets.map((b, i) => [b.key, i]));

      const strengthVolume = {}; // { category: [volPerWeek] }
      const cardioMinutes = {};  // { subcategory: [minPerWeek] }

      for (const cat of Object.keys(CATEGORIES)) {
        if (cat !== 'Cardio') strengthVolume[cat] = new Array(buckets.length).fill(0);
      }
      for (const sub of CATEGORIES.Cardio) {
        cardioMinutes[sub] = new Array(buckets.length).fill(0);
      }

      for (const s of sessions) {
        const d = new Date(s.datetime);
        const { key } = isoWeek(d);
        const i = idx.get(key);
        if (i === undefined) continue;
        for (const ex of (s.exercises || [])) {
          if (ex.type === 'cardio') {
            const sub = ex.subcategory;
            if (sub && cardioMinutes[sub] && ex.minutes) {
              cardioMinutes[sub][i] += Number(ex.minutes) || 0;
            }
          } else {
            const cat = ex.category;
            if (cat && strengthVolume[cat]) {
              const sets = Number(ex.sets) || 0;
              const reps = Number(ex.reps) || 0;
              const weight = Number(ex.weight) || 0;
              // Bruk vekt × sett × reps; hvis vekt er 0 (kroppsvekt) bruk sett × reps
              const vol = weight > 0 ? sets * reps * weight : sets * reps;
              strengthVolume[cat][i] += vol;
            }
          }
        }
      }

      return { buckets, strengthVolume, cardioMinutes };
    }

    function renderStackedBarSVG({ buckets, series, colors, unit, title }) {
      const W = Math.max(640, buckets.length * 52 + 60);
      const H = 220;
      const pad = { top: 16, right: 12, bottom: 28, left: 44 };
      const chartW = W - pad.left - pad.right;
      const chartH = H - pad.top - pad.bottom;

      const seriesKeys = Object.keys(series);
      const totals = buckets.map((_, i) =>
        seriesKeys.reduce((sum, k) => sum + (series[k][i] || 0), 0)
      );
      const maxTotal = Math.max(1, ...totals);

      // "Nice" y-akse steg
      function niceStep(max) {
        const pow = Math.pow(10, Math.floor(Math.log10(max)));
        const n = max / pow;
        const step = n <= 1 ? 0.2 : n <= 2 ? 0.5 : n <= 5 ? 1 : 2;
        return step * pow;
      }
      const step = niceStep(maxTotal);
      const yMax = Math.ceil(maxTotal / step) * step;

      const barW = chartW / buckets.length * 0.7;
      const barGap = chartW / buckets.length;

      let bars = '';
      buckets.forEach((b, i) => {
        let yCursor = pad.top + chartH;
        const x = pad.left + barGap * i + (barGap - barW) / 2;
        for (const key of seriesKeys) {
          const v = series[key][i] || 0;
          if (v <= 0) continue;
          const h = (v / yMax) * chartH;
          yCursor -= h;
          bars += `<rect class="bar" x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" fill="${colors[key]}" opacity="0.9"><title>${key}: ${Math.round(v)} ${unit} (${b.label})</title></rect>`;
        }
      });

      // Gridlines + y-labels
      let grid = '';
      const ticks = 4;
      for (let t = 0; t <= ticks; t++) {
        const v = yMax * t / ticks;
        const y = pad.top + chartH - (v / yMax) * chartH;
        grid += `<line class="grid" x1="${pad.left}" x2="${W - pad.right}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" />`;
        grid += `<text class="axis-label" x="${pad.left - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end">${Math.round(v)}</text>`;
      }

      // X-labels (vis annenhver hvis mange)
      const stepX = buckets.length > 16 ? 2 : 1;
      let xLabels = '';
      buckets.forEach((b, i) => {
        if (i % stepX !== 0) return;
        const x = pad.left + barGap * i + barGap / 2;
        xLabels += `<text class="axis-label" x="${x.toFixed(1)}" y="${H - 10}" text-anchor="middle">${b.label}</text>`;
      });

      const legend = seriesKeys
        .filter(k => series[k].some(v => v > 0))
        .map(k => `<span><i style="background:${colors[k]}"></i>${k}</span>`)
        .join('');

      const hasData = totals.some(v => v > 0);

      return `
        <div class="chart-block">
          <div class="chart-title">${escapeHtml(title)}</div>
          ${hasData ? `
          <div class="chart-wrap">
            <svg class="bar-chart" viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
              ${grid}
              ${bars}
              ${xLabels}
            </svg>
            <div class="chart-legend">${legend}</div>
          </div>` : `<div class="chart-empty">Ingen data i valgt periode.</div>`}
        </div>`;
    }

    function renderProgress() {
      const weeksBack = parseInt(chartRangeEl.value, 10) || 12;
      const sessions = load();
      const { buckets, strengthVolume, cardioMinutes } = aggregate(sessions, weeksBack);

      const strengthChart = renderStackedBarSVG({
        buckets,
        series: strengthVolume,
        colors: CATEGORY_COLORS,
        unit: 'kg·reps',
        title: 'Styrkevolum per uke (kg · reps)'
      });

      const cardioChart = renderStackedBarSVG({
        buckets,
        series: cardioMinutes,
        colors: CARDIO_COLORS,
        unit: 'min',
        title: 'Cardio minutter per uke'
      });

      progressChartsEl.innerHTML = strengthChart + cardioChart;
    }

    // --- Event-handlere -------------------------------------------------

    addExerciseBtn.addEventListener('click', addExerciseToDraft);
    saveSessionBtn.addEventListener('click', saveSession);
    categoryEl.addEventListener('change', onCategoryChange);
    chartRangeEl.addEventListener('change', renderProgress);

    // Enter i øvelsesfeltene legger til øvelsen
    [exerciseEl, setsEl, repsEl, weightEl, minutesEl, distanceEl, resistanceEl].forEach(el => {
      el.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          addExerciseToDraft();
        }
      });
    });

    searchEl.addEventListener('input', render);

    exportBtn.addEventListener('click', () => {
      const data = load();
      if (data.length === 0) {
        alert('Ingen økter å eksportere.');
        return;
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `treningsdagbok-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // Init
    populateCategorySelect();
    populateSubcategorySelect(currentCategory());
    syncFieldGroups();
    renderDraft();
    render();
  </script>
</body>
