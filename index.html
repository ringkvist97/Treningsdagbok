<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treningsdagbok</title>
  <style>
    :root {
      --bg: #0b0f13;
      --bg-elev: #141a22;
      --bg-elev-2: #1b2430;
      --border: #243042;
      --text: #e6edf3;
      --text-dim: #8b96a5;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --danger: #ff4d6d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    body {
      background:
        radial-gradient(1000px 500px at 10% -10%, rgba(0, 255, 136, 0.08), transparent 60%),
        radial-gradient(800px 400px at 110% 10%, rgba(0, 204, 255, 0.06), transparent 60%),
        var(--bg);
    }

    header {
      padding: 32px 24px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header h1 .accent {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
    }

    header p {
      color: var(--text-dim);
      margin: 8px 0 0;
      font-size: 0.95rem;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 80px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .session-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea, select {
      width: 100%;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.15);
    }

    textarea { resize: vertical; min-height: 60px; }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.1s, box-shadow 0.15s, background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #001912;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 6px 20px rgba(0, 255, 136, 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-elev-2);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 136, 0.08);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 77, 109, 0.3);
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: rgba(255, 77, 109, 0.1);
    }

    .exercises-section {
      border-top: 1px dashed var(--border);
      padding-top: 16px;
      margin-top: 4px;
    }

    .exercises-section-title {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .exercise-row {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .exercise-row-main {
      display: grid;
      gap: 2px;
    }

    .exercise-row-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .exercise-row-meta {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .exercise-form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 12px;
    }

    .exercise-form-grid label {
      margin-bottom: 4px;
    }

    .exercise-form-grid .btn-secondary {
      height: 42px;
    }

    .empty-exercises {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      padding: 16px;
      font-style: italic;
    }

    .submit-row {
      margin-top: 16px;
    }

    .submit-row button {
      width: 100%;
    }

    .history-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search {
      flex: 1;
      min-width: 180px;
    }

    .stats {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .stats strong {
      color: var(--accent);
      font-size: 1rem;
    }

    .day-group {
      margin-bottom: 20px;
    }

    .day-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .day-header h3 {
      margin: 0;
      font-size: 1rem;
      color: var(--accent);
      text-transform: capitalize;
    }

    .day-header span {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .session-card {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .session-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .session-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .session-card-title .time {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .session-exercises {
      display: grid;
      gap: 6px;
    }

    .session-exercise {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .session-exercise-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .session-exercise-meta {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .chip {
      display: inline-block;
      background: rgba(0, 255, 136, 0.08);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 999px;
      margin-right: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .session-notes {
      color: var(--text-dim);
      font-size: 0.85rem;
      font-style: italic;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 30px 10px;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .exercise-form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .exercise-form-grid .field-exercise {
        grid-column: 1 / -1;
      }
      .exercise-form-grid .btn-secondary {
        grid-column: 1 / -1;
        width: 100%;
      }
    }

    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trenings<span class="accent">dagbok</span></h1>
    <p>Logg hver økt. Se fremgangen.</p>
  </header>

  <main>
    <section class="card">
      <h2>Ny økt</h2>

      <div class="session-meta">
        <div>
          <label for="datetime">Dato og tidspunkt</label>
          <input type="datetime-local" id="datetime" required />
        </div>
        <div>
          <label for="session-notes">Notat for hele økten (valgfritt)</label>
          <textarea id="session-notes" placeholder="Hvordan føltes økten? Energi, søvn, form..."></textarea>
        </div>
      </div>

      <div class="exercises-section">
        <div class="exercises-section-title">Øvelser i denne økten</div>
        <div id="draft-exercises"></div>

        <div class="exercise-form-grid">
          <div class="field-exercise">
            <label for="exercise">Øvelse</label>
            <input type="text" id="exercise" placeholder="f.eks. Markløft" />
          </div>
          <div>
            <label for="sets">Sett</label>
            <input type="number" id="sets" min="1" step="1" placeholder="3" />
          </div>
          <div>
            <label for="reps">Reps</label>
            <input type="number" id="reps" min="1" step="1" placeholder="8" />
          </div>
          <div>
            <label for="weight">Vekt (kg)</label>
            <input type="number" id="weight" min="0" step="0.5" placeholder="80" />
          </div>
          <button type="button" id="add-exercise-btn" class="btn-secondary">+ Legg til</button>
        </div>

        <div class="submit-row">
          <button type="button" id="save-session-btn" class="btn-primary">Lagre økt</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Historikk</h2>
      <div class="history-controls">
        <input type="search" id="search" class="search" placeholder="Søk i øvelser eller notater..." />
        <div class="stats" id="stats">0 økter lagret</div>
        <button type="button" id="export-btn" class="btn-ghost">Eksporter</button>
      </div>
      <div id="history"></div>
    </section>
  </main>

  <footer>Data lagres lokalt i nettleseren din.</footer>

  <script>
    const STORAGE_KEY = 'treningsdagbok.sessions.v2';
    const OLD_STORAGE_KEY = 'treningsdagbok.entries.v1';

    const dtInput = document.getElementById('datetime');
    const sessionNotesEl = document.getElementById('session-notes');
    const exerciseEl = document.getElementById('exercise');
    const setsEl = document.getElementById('sets');
    const repsEl = document.getElementById('reps');
    const weightEl = document.getElementById('weight');
    const addExerciseBtn = document.getElementById('add-exercise-btn');
    const saveSessionBtn = document.getElementById('save-session-btn');
    const draftEl = document.getElementById('draft-exercises');
    const historyEl = document.getElementById('history');
    const statsEl = document.getElementById('stats');
    const searchEl = document.getElementById('search');
    const exportBtn = document.getElementById('export-btn');

    // Øvelser som ligger i den pågående (ulagrede) økten
    let draftExercises = [];

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function setNow() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      dtInput.value = d.toISOString().slice(0, 16);
    }
    setNow();

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);

        // Migrering: gamle data der hver øvelse var sin egen "økt"
        const oldRaw = localStorage.getItem(OLD_STORAGE_KEY);
        if (oldRaw) {
          const oldEntries = JSON.parse(oldRaw);
          const migrated = oldEntries.map(e => ({
            id: e.id || uid(),
            datetime: e.datetime,
            notes: e.notes || '',
            exercises: [{
              id: uid(),
              exercise: e.exercise,
              sets: e.sets,
              reps: e.reps,
              weight: e.weight ?? null
            }]
          }));
          save(migrated);
          return migrated;
        }
        return [];
      } catch (e) {
        console.error('Kunne ikke lese lagrede data', e);
        return [];
      }
    }

    function save(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function formatDateKey(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('no-NO', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderDraft() {
      if (draftExercises.length === 0) {
        draftEl.innerHTML = `<div class="empty-exercises">Ingen øvelser lagt til ennå. Fyll inn feltene under og trykk "Legg til".</div>`;
        return;
      }
      draftEl.innerHTML = draftExercises.map(ex => {
        const weightText = ex.weight ? `${ex.weight} kg` : 'kroppsvekt';
        return `
          <div class="exercise-row">
            <div class="exercise-row-main">
              <div class="exercise-row-title">${escapeHtml(ex.exercise)}</div>
              <div class="exercise-row-meta">
                <span class="chip">${ex.sets} × ${ex.reps}</span>
                <span class="chip">${escapeHtml(weightText)}</span>
              </div>
            </div>
            <button type="button" class="btn-danger" data-draft-id="${ex.id}">Fjern</button>
          </div>`;
      }).join('');

      draftEl.querySelectorAll('button[data-draft-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          draftExercises = draftExercises.filter(ex => ex.id !== btn.dataset.draftId);
          renderDraft();
        });
      });
    }

    function addExerciseToDraft() {
      const exercise = exerciseEl.value.trim();
      const sets = parseInt(setsEl.value, 10);
      const reps = parseInt(repsEl.value, 10);
      const weightRaw = weightEl.value;

      if (!exercise) {
        exerciseEl.focus();
        return;
      }
      if (!sets || sets < 1) {
        setsEl.focus();
        return;
      }
      if (!reps || reps < 1) {
        repsEl.focus();
        return;
      }

      draftExercises.push({
        id: uid(),
        exercise,
        sets,
        reps,
        weight: weightRaw ? parseFloat(weightRaw) : null
      });

      // Nullstill øvelsesfeltene, men la datetime og notat være
      exerciseEl.value = '';
      setsEl.value = '';
      repsEl.value = '';
      weightEl.value = '';
      exerciseEl.focus();

      renderDraft();
    }

    function saveSession() {
      if (draftExercises.length === 0) {
        alert('Legg til minst én øvelse før du lagrer økten.');
        return;
      }
      if (!dtInput.value) {
        alert('Velg dato og tidspunkt.');
        return;
      }

      const session = {
        id: uid(),
        datetime: new Date(dtInput.value).toISOString(),
        notes: sessionNotesEl.value.trim(),
        exercises: draftExercises.map(ex => ({ ...ex }))
      };

      const sessions = load();
      sessions.push(session);
      save(sessions);

      // Nullstill skjemaet
      draftExercises = [];
      sessionNotesEl.value = '';
      exerciseEl.value = '';
      setsEl.value = '';
      repsEl.value = '';
      weightEl.value = '';
      setNow();

      renderDraft();
      render();
    }

    function deleteSession(id) {
      if (!confirm('Slette hele denne økten?')) return;
      const sessions = load().filter(s => s.id !== id);
      save(sessions);
      render();
    }

    function sessionMatchesQuery(session, query) {
      if (!query) return true;
      if ((session.notes || '').toLowerCase().includes(query)) return true;
      return session.exercises.some(ex =>
        (ex.exercise || '').toLowerCase().includes(query)
      );
    }

    function render() {
      const all = load();
      const query = searchEl.value.trim().toLowerCase();
      const filtered = all.filter(s => sessionMatchesQuery(s, query));

      statsEl.innerHTML = `<strong>${all.length}</strong> økt${all.length === 1 ? '' : 'er'} lagret`;

      if (filtered.length === 0) {
        historyEl.innerHTML = `<div class="empty">${
          all.length === 0
            ? 'Ingen økter ennå. Legg til din første over.'
            : 'Ingen treff på søket ditt.'
        }</div>`;
        return;
      }

      const sorted = [...filtered].sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

      // Grupper etter dato
      const groups = new Map();
      for (const s of sorted) {
        const key = formatDateKey(s.datetime);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(s);
      }

      let html = '';
      for (const [day, sessions] of groups) {
        const totalExercises = sessions.reduce((sum, s) => sum + s.exercises.length, 0);
        html += `<div class="day-group">
          <div class="day-header">
            <h3>${escapeHtml(day)}</h3>
            <span>${sessions.length} økt${sessions.length === 1 ? '' : 'er'} · ${totalExercises} øvelse${totalExercises === 1 ? '' : 'r'}</span>
          </div>`;

        for (const s of sessions) {
          html += `
            <div class="session-card">
              <div class="session-card-header">
                <div class="session-card-title">
                  <span class="time">${formatTime(s.datetime)}</span>
                  <span>· ${s.exercises.length} øvelse${s.exercises.length === 1 ? '' : 'r'}</span>
                </div>
                <button type="button" class="btn-danger" data-session-id="${s.id}">Slett økt</button>
              </div>
              <div class="session-exercises">`;

          for (const ex of s.exercises) {
            const weightText = ex.weight ? `${ex.weight} kg` : 'kroppsvekt';
            html += `
                <div class="session-exercise">
                  <div>
                    <div class="session-exercise-name">${escapeHtml(ex.exercise)}</div>
                    <div class="session-exercise-meta">
                      <span class="chip">${ex.sets} × ${ex.reps}</span>
                      <span class="chip">${escapeHtml(weightText)}</span>
                    </div>
                  </div>
                </div>`;
          }

          html += `</div>`;

          if (s.notes) {
            html += `<div class="session-notes">${escapeHtml(s.notes)}</div>`;
          }

          html += `</div>`;
        }
        html += `</div>`;
      }
      historyEl.innerHTML = html;

      historyEl.querySelectorAll('button[data-session-id]').forEach(btn => {
        btn.addEventListener('click', () => deleteSession(btn.dataset.sessionId));
      });
    }

    // Event-handlere
    addExerciseBtn.addEventListener('click', addExerciseToDraft);
    saveSessionBtn.addEventListener('click', saveSession);

    // Enter i øvelsesfeltene legger til øvelsen
    [exerciseEl, setsEl, repsEl, weightEl].forEach(el => {
      el.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          addExerciseToDraft();
        }
      });
    });

    searchEl.addEventListener('input', render);

    exportBtn.addEventListener('click', () => {
      const data = load();
      if (data.length === 0) {
        alert('Ingen økter å eksportere.');
        return;
      }
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `treningsdagbok-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    renderDraft();
    render();
  </script>
</body>
</html>
